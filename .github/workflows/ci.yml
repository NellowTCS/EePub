name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive
        
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build build-essential
      - name: Build Lexbor
        run: scripts/build_lexbor.sh
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target EePubDesktop
      - name: Smoke test CLI
        run: ./build/EePubDesktop "examples/Accessible EPUB 3 _ Matt Garrish.epub" --headless --render-all
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: EePubDesktop-linux
          path: build/EePubDesktop

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Build WASM bindings
        run: scripts/build_wasm.sh
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EePub-wasm
          path: |
            wasm/EePubWasm.js
            wasm/EePubWasm.wasm
            wasm/index.html

  build-esp32-cyd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio
      - name: Build Cheap Yellow Display firmware
        run: scripts/build_esp32_cyd.sh
      - name: Upload ESP32 firmware
        uses: actions/upload-artifact@v4
        with:
          name: EePub-esp32-cyd
          path: |
            platforms/esp32-cyd/.pio/build/cyd/firmware.bin
            platforms/esp32-cyd/.pio/build/cyd/bootloader.bin
            platforms/esp32-cyd/.pio/build/cyd/partitions.bin
